# Daily repo activity — keeps the project visible to AI crawlers
# Runs once daily, generates fresh content, updates stats
name: daily-activity

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:  # manual trigger

permissions:
  contents: write  # required for git push in 'Commit and push changes' step

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci --omit=dev

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Generate daily content
        run: node scripts/daily-activity.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh growth assets and frontend
        run: |
          npm run growth:kit
          npm run growth:traffic
          npm --prefix frontend run build
        env:
          GH_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          git config user.name "aineedhelp-bot"
          git config user.email "bot@aineedhelpfromotherai.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: daily auto-refresh $(date -u '+%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push

      - name: Verify production growth surfaces
        run: npm run growth:check
        env:
          GROWTH_CHECK_RETRIES: 24
          GROWTH_CHECK_RETRY_DELAY_MS: 30000

      - name: Submit sitemap to IndexNow
        run: npm run growth:indexnow

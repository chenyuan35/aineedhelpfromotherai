name: Auth Demo E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  auth-demo-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Start Express server (background)
        run: |
          npm start > /tmp/server.log 2>&1 &
          sleep 2
          # Wait for health check
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/health | grep -q 'ok'; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server (attempt $i)..."
            sleep 1
          done
      - name: Run auth-demo (bash)
        run: |
          chmod +x ./scripts/auth-demo.sh || true
          ./scripts/auth-demo.sh demo-agent http://localhost:3000 || true

  auth-demo-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Start Express server (background)
        shell: pwsh
        run: |
          $job = Start-Job -ScriptBlock { npm start }
          Start-Sleep -Seconds 2
          # Wait for health check
          for ($i = 1; $i -le 30; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri http://localhost:3000/api/health -ErrorAction SilentlyContinue
              if ($resp.StatusCode -eq 200) { Write-Host "Server is ready"; break }
            } catch {}
            Write-Host "Waiting for server (attempt $i)..."
            Start-Sleep -Seconds 1
          }
      - name: Run auth-demo (powershell)
        shell: pwsh
        run: |
          ./scripts/auth-demo.ps1 -Agent demo-agent -HostUrl http://localhost:3000

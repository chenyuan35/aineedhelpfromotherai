name: npm Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Optional version bump (patch/minor/major). Leave empty to publish package.json versions.
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: ${{ secrets.NPM_TOKEN && 'https://registry.npmjs.org' || 'https://npm.pkg.github.com' }}
          scope: ${{ secrets.NPM_TOKEN && '' || '@chenyuan35' }}
      - run: npm ci || npm install --omit=dev
      - name: Skip root app package
        run: |
          echo "The repository root is the deployed website/backend app, not an npm integration package."
          echo "Publishing is limited to packages/mcp-bridge, packages/n8n-node, and packages/langchain-tool."
      - name: Publish MCP bridge package
        working-directory: packages/mcp-bridge
        run: |
          REQUESTED_BUMP="${{ github.event.inputs.version || '' }}"
          if [ -n "$REQUESTED_BUMP" ]; then
            npm version "$REQUESTED_BUMP" --no-git-tag-version
          fi
          VER=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VER" version 2>/dev/null; then
            LATEST=$(npm view "$NAME" version)
            npm version "$LATEST" --no-git-tag-version --allow-same-version
            npm version patch --no-git-tag-version
            VER=$(node -p "require('./package.json').version")
          fi
          echo "Publishing $NAME@$VER"
          if npm view "$NAME@$VER" version 2>/dev/null; then
            echo "Version $VER already exists on npm, skipping"
            exit 0
          fi
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
            npm publish --access public
          else
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
            npm config set registry https://npm.pkg.github.com
            jq '.name = "@chenyuan35/aineedhelpfromotherai-mcp" | .publishConfig.registry = "https://npm.pkg.github.com"' package.json > package.json.tmp
            mv package.json.tmp package.json
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Publish n8n community node
        working-directory: packages/n8n-node
        run: |
          REQUESTED_BUMP="${{ github.event.inputs.version || '' }}"
          if [ -n "$REQUESTED_BUMP" ]; then
            npm version "$REQUESTED_BUMP" --no-git-tag-version
          fi
          VER=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VER" version 2>/dev/null; then
            LATEST=$(npm view "$NAME" version)
            npm version "$LATEST" --no-git-tag-version --allow-same-version
            npm version patch --no-git-tag-version
            VER=$(node -p "require('./package.json').version")
          fi
          echo "Publishing $NAME@$VER"
          if npm view "$NAME@$VER" version 2>/dev/null; then
            echo "Version $VER already exists on npm, skipping"
            exit 0
          fi
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
            npm publish --access public
          else
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
            npm config set registry https://npm.pkg.github.com
            jq '.name = "@chenyuan35/aineedhelpfromotherai-n8n" | .publishConfig.registry = "https://npm.pkg.github.com"' package.json > package.json.tmp
            mv package.json.tmp package.json
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Publish LangChain tool
        working-directory: packages/langchain-tool
        run: |
          REQUESTED_BUMP="${{ github.event.inputs.version || '' }}"
          if [ -n "$REQUESTED_BUMP" ]; then
            npm version "$REQUESTED_BUMP" --no-git-tag-version
          fi
          VER=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "$NAME@$VER" version 2>/dev/null; then
            LATEST=$(npm view "$NAME" version)
            npm version "$LATEST" --no-git-tag-version --allow-same-version
            npm version patch --no-git-tag-version
            VER=$(node -p "require('./package.json').version")
          fi
          echo "Publishing $NAME@$VER"
          if npm view "$NAME@$VER" version 2>/dev/null; then
            echo "Version $VER already exists on npm, skipping"
            exit 0
          fi
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
            npm publish --access public
          else
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
            npm config set registry https://npm.pkg.github.com
            jq '.name = "@chenyuan35/aineedhelpfromotherai-langchain" | .publishConfig.registry = "https://npm.pkg.github.com"' package.json > package.json.tmp
            mv package.json.tmp package.json
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}

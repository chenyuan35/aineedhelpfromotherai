name: npm Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
    version:
      description: Version bump (patch/minor/major)
      required: true
      default: patch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci || npm install --omit=dev
      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish MCP bridge package
        working-directory: packages/mcp-bridge
        run: |
          npm version ${{ github.event.inputs.version || 'patch' }} --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

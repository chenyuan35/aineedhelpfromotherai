name: Backup smoke test

'on':
  push:
    branches: [main]
    paths:
      - '.github/workflows/backup-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_ENV: ${{ secrets.VPS_ENV }}
    steps:
      - name: Run pg_dump on VPS
        run: |
          set -euo pipefail
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_ENV" ]; then
            echo "Missing VPS_HOST, VPS_USER, VPS_SSH_KEY, or VPS_ENV"
            exit 1
          fi
          mkdir -p ~/.ssh backup
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/backup_key
          chmod 600 ~/.ssh/backup_key
          remote="$VPS_USER@$VPS_HOST"
          ssh -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote" 'mkdir -p ~/.config/aineedhelpfromotherai ~/aineedhelpfromotherai-db-backups && chmod 700 ~/.config/aineedhelpfromotherai'
          printf '%s\n' "$VPS_ENV" | ssh -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote" 'cat > ~/.config/aineedhelpfromotherai/.env.vps && sed -i "s/\r$//" ~/.config/aineedhelpfromotherai/.env.vps && chmod 600 ~/.config/aineedhelpfromotherai/.env.vps'
          ssh -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote" 'set -euo pipefail; command -v pg_dump; timestamp=$(date -u +%Y-%m-%dT%H-%M-%S-%NZ); file=~/aineedhelpfromotherai-db-backups/render-postgres-${timestamp}.dump; set -a; . ~/.config/aineedhelpfromotherai/.env.vps; set +a; db_url=${DATABASE_URL:-${PG_CONNECTION_STRING:-}}; if [ -z "$db_url" ]; then echo "Missing DATABASE_URL or PG_CONNECTION_STRING on VPS"; exit 1; fi; PGSSLMODE=${PGSSLMODE:-disable} pg_dump --dbname "$db_url" --format=custom --no-owner --no-acl --file "$file"; test -s "$file"; sha256sum "$file" > "$file.sha256"; basename "$file"'
          latest=$(ssh -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote" 'ls -t ~/aineedhelpfromotherai-db-backups/render-postgres-*.dump | head -1')
          scp -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote:$latest" backup/
          scp -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote:$latest.sha256" backup/
          test -s "backup/$(basename "$latest")"
          echo "VPS backup created: $(basename "$latest")"

      - name: Upload GitHub backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-postgres-backup
          path: backup/
          retention-days: 14

      - name: Cleanup runner copy
        if: always()
        run: rm -rf backup ~/.ssh/backup_key

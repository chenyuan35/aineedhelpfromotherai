name: Backup smoke test

'on':
  push:
    branches: [main]
    paths:
      - '.github/workflows/backup-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RENDER_POSTGRES_EXTERNAL_HOST: dpg-d8c164cua31s739joel0-a.oregon-postgres.render.com
    steps:
      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Resolve Render database URL
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" -H "Accept: application/json" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" > render-env-vars.json
          DATABASE_URL=$(python3 -c "import json; data=json.load(open('render-env-vars.json')); items=data if isinstance(data,list) else data.get('envVars') or data.get('env_vars') or []; print(next(((i.get('envVar') or i.get('env_var') or i).get('value') or '' for i in items if (i.get('envVar') or i.get('env_var') or i).get('key') == 'DATABASE_URL'), ''))")
          if [ -z "$DATABASE_URL" ] || [[ "$DATABASE_URL" == *"*****"* ]]; then
            echo "Render DATABASE_URL was not available from the service env vars"
            exit 1
          fi
          echo "::add-mask::$DATABASE_URL"
          EXTERNAL_URL=$(DATABASE_URL="$DATABASE_URL" RENDER_POSTGRES_EXTERNAL_HOST="$RENDER_POSTGRES_EXTERNAL_HOST" python3 -c "import os; from urllib.parse import urlsplit,urlunsplit,parse_qsl,urlencode; p=urlsplit(os.environ['DATABASE_URL']); ui=''; ui=(p.username or '') + (((':' + p.password) if p.password else '') if p.username else '') + (('@') if p.username else ''); host=os.environ.get('RENDER_POSTGRES_EXTERNAL_HOST',''); netloc=p.netloc; netloc=(ui + host + ':5432') if host and (p.hostname or '').startswith('dpg-') and '.render.com' not in (p.hostname or '') else netloc; q=dict(parse_qsl(p.query, keep_blank_values=True)); q.setdefault('sslmode','require'); print(urlunsplit((p.scheme or 'postgresql', netloc, p.path, urlencode(q), '')))")
          echo "::add-mask::$EXTERNAL_URL"
          printf 'DATABASE_URL=%s\n' "$EXTERNAL_URL" >> "$GITHUB_ENV"

      - name: Create pg_dump backup
        run: |
          set -euo pipefail
          mkdir -p backup
          timestamp=$(date -u +%Y-%m-%dT%H-%M-%S-%NZ)
          file="backup/render-postgres-$timestamp.dump"
          pg_dump --dbname "$DATABASE_URL" --format=custom --no-owner --no-acl --file "$file"
          test -s "$file"
          sha256sum "$file" > "$file.sha256"
          echo "Backup created: $(basename "$file") ($(stat -c%s "$file") bytes)"

      - name: Upload GitHub backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-postgres-backup
          path: backup/
          retention-days: 14

      - name: Cleanup runner copy
        if: always()
        run: rm -rf backup render-env-vars.json

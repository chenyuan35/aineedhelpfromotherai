name: CI
on:
  push:
    branches: [main, opencode/shiny-planet]
    paths:
      - 'server.js'
      - 'lib/*.js'
      - 'mcp/*.js'
      - 'api-handlers/*.js'
      - 'package.json'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server.js'
      - 'lib/*.js'
      - 'mcp/*.js'
      - 'api-handlers/*.js'
      - 'package.json'
      - 'Dockerfile'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci || npm install --omit=dev

      # Write queue compliance: no bare writeFileSync/appendFileSync across all .js
      # Exceptions:
      #   fs-safe.js, write-queue.js  — authorized wrappers (by design)
      #   scripts/                    — build/tooling scripts (not runtime)
      #   resolve-cache.js, execution-log.js, verification.js, elo-rating.js,
      #   memory-api.js, commit-log.js, snapshot.js — event-sourcing reducers,
      #     each write is guarded by writeAuthority.authorizeWrite(REDUCER_CAP)
      #     These are the designated single writers for their respective files.
      #   api-handlers/posts.js — JSON fallback writes to seed data (api/ not data/)
      #     Not runtime state; PostgreSQL unavailable fallback path.
      # Experimental/ directory is excluded (isolated by design).
      - name: Write queue compliance
        run: |
          violations=0
          while IFS= read -r f; do
            basename=$(basename "$f")
            case "$basename" in
              fs-safe.js|write-queue.js|resolve-cache.js|execution-log.js|verification.js|elo-rating.js|memory-api.js|commit-log.js|snapshot.js|posts.js|drift-state.js|drift-state.test.js|drift-detector.test.js|intervention-engine.test.js|auto-failure-recorder.test.js) continue ;;
            esac
            case "$f" in
              */scripts/*) continue ;;
            esac
            if grep -n 'writeFileSync\|appendFileSync' "$f" 2>/dev/null; then
              echo "FAIL: Bare writeFileSync/appendFileSync found in $f"
              violations=1
            fi
          done < <(find . -name '*.js' -not -path '*/node_modules/*' -not -path '*/experimental/*')
          if [ "$violations" = 1 ]; then exit 1; fi
          echo "Write queue compliance: OK"

      # Experimental isolation: no runtime data paths from experimental code
      # Exemptions:
      #   lib/write-levels.js — authoritative definition of all allowed data paths
      #   lib/execution-log.js — comment-only reference in file header (no runtime usage of bare paths)
      - name: Experimental data isolation
        run: |
          violations=0
          for dir in lib mcp api-handlers; do
            for f in $(find "$dir" -name '*.js' 2>/dev/null); do
              basename=$(basename "$f")
              case "$basename" in
                write-levels.js|execution-log.js) continue ;;
              esac
              if grep -n 'data/execution_log\|data/resolve-cache\|data/elo-ratings\|data/verification-state\|data/memory-api-log' "$f" 2>/dev/null; then
                echo "FAIL: Runtime data path referenced from $f"
                violations=1
              fi
            done
          done
          if [ "$violations" = 1 ]; then exit 1; fi
          echo "Experimental data isolation: OK"

      - run: node -e "require('./server.js')" &
        timeout-minutes: 1
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t aineedhelpfromotherai .
        timeout-minutes: 5

  health-check:
    runs-on: ubuntu-latest
    steps:
      - run: curl -sI https://api.aineedhelpfromotherai.com/api/health | head -1
        continue-on-error: true

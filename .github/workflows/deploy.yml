name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check VPS secrets
        run: |
          missing=0
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && echo "❌ VPS_SSH_KEY not set" && missing=1
          [ -z "${{ secrets.VPS_HOST }}" ] && echo "❌ VPS_HOST not set" && missing=1
          [ -z "${{ secrets.VPS_USER }}" ] && echo "❌ VPS_USER not set" && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "⏭️ Skipping deploy — add secrets at Settings → Secrets → Actions"
            exit 0
          fi
          echo "✅ All VPS secrets configured"

      - uses: actions/checkout@v4
      - name: rsync to VPS
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-avz -e 'ssh -p 2222' --exclude node_modules --exclude .git --exclude .env.* --exclude '*.local'"
          SOURCE: "."
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          REMOTE_PORT: 2222
          TARGET: /opt/aineedhelpfromotherai/
      - name: npm install & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            cd /opt/aineedhelpfromotherai
            npm install --production
            pm2 restart aineedhelp

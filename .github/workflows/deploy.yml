name: Deploy to Render
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render deploy and wait for live status
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          render_api() {
            curl -fsS "$@" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json"
          }

          DEPLOY_JSON=$(render_api -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Content-Type: application/json" \
            -d '{}' || true)
          DEPLOY_ID=$(printf '%s' "$DEPLOY_JSON" | python3 -c "import json,sys; s=sys.stdin.read().strip(); d=json.loads(s) if s[:1] in ('{','[') else {}; d=d.get('deploy', d) if isinstance(d, dict) else {}; print(d.get('id',''))")
          if [ -z "$DEPLOY_ID" ]; then
            echo "Render create-deploy response did not include an id; checking latest service deploys"
            sleep 5
            DEPLOYS_JSON=$(render_api "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=10")
            DEPLOY_ID=$(printf '%s' "$DEPLOYS_JSON" | python3 -c "import json,sys; data=json.load(sys.stdin); items=data if isinstance(data, list) else data.get('deploys', []) if isinstance(data, dict) else []; deploys=[item.get('deploy', item) for item in items if isinstance(item, dict)]; candidates=[d for d in deploys if d.get('status') not in ('live','deactivated')]; chosen=(candidates or deploys or [{}])[0]; print(chosen.get('id',''))")
          fi
          if [ -z "$DEPLOY_ID" ]; then
            echo "Unable to find a Render deploy id"
            exit 1
          fi

          for attempt in $(seq 1 60); do
            STATUS_JSON=$(render_api "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}")
            STATUS=$(printf '%s' "$STATUS_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); d=d.get('deploy', d) if isinstance(d, dict) else {}; print(d.get('status',''))")
            echo "Render deploy status: ${STATUS:-unknown} (attempt $attempt/60)"
            case "$STATUS" in
              live)
                exit 0
                ;;
              *failed*|canceled|cancelled)
                exit 1
                ;;
            esac
            sleep 10
          done

          echo "Timed out waiting for Render deploy to become live"
          exit 1

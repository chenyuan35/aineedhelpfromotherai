name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check VPS secrets
        run: |
          missing=0
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && echo "❌ VPS_SSH_KEY not set" && missing=1
          [ -z "${{ secrets.VPS_HOST }}" ] && echo "❌ VPS_HOST not set" && missing=1
          [ -z "${{ secrets.VPS_USER }}" ] && echo " VPS_USER not set" && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "️ Skipping deploy — add secrets at Settings → Secrets → Actions"
            exit 0
          fi
          echo "✅ All VPS secrets configured"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            set -e
            cd /opt/aineedhelpfromotherai
            echo "📦 Pulling latest code..."
            git pull origin main
            echo "📦 Installing dependencies..."
            npm install --production
            echo "🔄 Restarting PM2..."
            pm2 restart aineedhelp
            echo "✅ Deploy complete"

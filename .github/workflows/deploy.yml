name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check VPS secrets
        run: |
          missing=0
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && echo "❌ VPS_SSH_KEY not set" && missing=1
          [ -z "${{ secrets.VPS_HOST }}" ] && echo "❌ VPS_HOST not set" && missing=1
          [ -z "${{ secrets.VPS_USER }}" ] && echo "❌ VPS_USER not set" && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "️ Skipping deploy — add secrets at Settings → Secrets → Actions"
            exit 0
          fi
          echo "✅ All VPS secrets configured"

      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2222 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: rsync to VPS
        run: |
          rsync -avz -e "ssh -p 2222 -o StrictHostKeyChecking=no" \
            --exclude node_modules \
            --exclude .git \
            --exclude .env.* \
            --exclude '*.local' \
            --delete \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/aineedhelpfromotherai/

      - name: npm install & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            cd /opt/aineedhelpfromotherai
            npm install --production
            pm2 restart aineedhelp

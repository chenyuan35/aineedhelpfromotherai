name: Manual database backup

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RENDER_POSTGRES_ID: dpg-d8c164cua31s739joel0-a
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Resolve Render database URL
        run: |
          set -euo pipefail
          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_POSTGRES_ID}" ]; then
            echo "Missing RENDER_API_KEY or RENDER_POSTGRES_ID"
            exit 1
          fi
          node scripts/resolve-render-database-url.js

      - name: Diagnose Render Postgres access
        run: node scripts/render-postgres-diagnostics.js

      - name: Test psql connection
        run: |
          set -euo pipefail
          node - <<'NODE' >> "$GITHUB_ENV"
          const raw = process.env.DATABASE_URL;
          const parsed = new URL(raw);
          parsed.searchParams.set('sslmode', 'require');
          console.log(`DATABASE_URL_REQUIRE=${parsed.toString()}`);
          parsed.searchParams.set('sslmode', 'prefer');
          console.log(`DATABASE_URL_PREFER=${parsed.toString()}`);
          parsed.searchParams.set('sslmode', 'disable');
          console.log(`DATABASE_URL_DISABLE=${parsed.toString()}`);
          NODE
          echo "::add-mask::${DATABASE_URL_REQUIRE}"
          echo "::add-mask::${DATABASE_URL_PREFER}"
          echo "::add-mask::${DATABASE_URL_DISABLE}"
          set +e
          for mode in REQUIRE PREFER DISABLE; do
            url_var="DATABASE_URL_${mode}"
            echo "[psql-diagnostics] trying sslmode=${mode,,}"
            psql "${!url_var}" -c 'select current_database(), current_user, version();'
            code=$?
            echo "[psql-diagnostics] sslmode=${mode,,} exit=${code}"
          done
          exit 1

      - name: Create pg_dump backup
        run: |
          set -euo pipefail
          mkdir -p backup
          timestamp=$(date -u +%Y-%m-%dT%H-%M-%S-%NZ)
          file="backup/render-postgres-${timestamp}.dump"
          pg_dump --dbname "${DATABASE_URL}" --format=custom --no-owner --no-acl --file "${file}"
          test -s "${file}"
          sha256sum "${file}" > "${file}.sha256"
          printf 'BACKUP_FILE=%s\n' "${file}" >> "$GITHUB_ENV"
          echo "Backup created: $(basename "${file}") ($(stat -c%s "${file}") bytes)"

      - name: Upload GitHub backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-postgres-backup
          path: |
            ${{ env.BACKUP_FILE }}
            ${{ env.BACKUP_FILE }}.sha256
          retention-days: 14

      - name: Cleanup runner copy
        if: always()
        run: rm -rf backup


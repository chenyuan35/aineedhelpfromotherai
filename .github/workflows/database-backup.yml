name: Manual database backup

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RENDER_POSTGRES_ID: dpg-d8c164cua31s739joel0-a
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_PGSSLMODE: ${{ secrets.VPS_PGSSLMODE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Render database URL
        run: |
          set -euo pipefail
          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_POSTGRES_ID}" ]; then
            echo "Missing RENDER_API_KEY or RENDER_POSTGRES_ID"
            exit 1
          fi
          node scripts/resolve-render-database-url.js

      - name: Diagnose Render Postgres access
        run: node scripts/render-postgres-diagnostics.js

      - name: Create pg_dump backup on VPS
        run: |
          set -euo pipefail
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ] || [ -z "$DATABASE_URL" ]; then
            echo "Missing VPS_HOST, VPS_USER, VPS_SSH_KEY, or resolved DATABASE_URL"
            exit 1
          fi
          mkdir -p backup
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/backup_key
          chmod 600 ~/.ssh/backup_key
          remote="$VPS_USER@$VPS_HOST"
          cleaned_url=$(DATABASE_URL="$DATABASE_URL" python3 -c "import os; from urllib.parse import urlsplit,urlunsplit,parse_qsl,urlencode; p=urlsplit(os.environ['DATABASE_URL']); q=[(k,v) for k,v in parse_qsl(p.query, keep_blank_values=True) if k not in {'uselibpqcompat'}]; print(urlunsplit((p.scheme,p.netloc,p.path,urlencode(q),'')))")
          db_url_b64=$(printf '%s' "$cleaned_url" | base64 -w0)
          pgsslmode_b64=$(printf '%s' "${VPS_PGSSLMODE:-require}" | base64 -w0)
          ssh -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote" "set -euo pipefail; command -v pg_dump; mkdir -p ~/aineedhelpfromotherai-db-backups; timestamp=\$(date -u +%Y-%m-%dT%H-%M-%S-%NZ); file=~/aineedhelpfromotherai-db-backups/render-postgres-\${timestamp}.dump; db_url=\$(printf '%s' '$db_url_b64' | base64 -d); pgsslmode=\$(printf '%s' '$pgsslmode_b64' | base64 -d); PGSSLMODE=\$pgsslmode pg_dump --dbname \"\$db_url\" --format=custom --no-owner --no-acl --file \"\$file\"; test -s \"\$file\"; sha256sum \"\$file\" > \"\$file.sha256\"; basename \"\$file\""
          latest=$(ssh -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote" 'ls -t ~/aineedhelpfromotherai-db-backups/render-postgres-*.dump | head -1')
          scp -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote:$latest" backup/
          scp -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new "$remote:$latest.sha256" backup/
          test -s "backup/$(basename "$latest")"
          file="backup/$(basename "$latest")"
          printf 'BACKUP_FILE=%s\n' "${file}" >> "$GITHUB_ENV"
          echo "Backup created: $(basename "${file}") ($(stat -c%s "${file}") bytes)"

      - name: Upload GitHub backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-postgres-backup
          path: |
            ${{ env.BACKUP_FILE }}
            ${{ env.BACKUP_FILE }}.sha256
          retention-days: 14

      - name: Cleanup runner copy
        if: always()
        run: |
          rm -rf backup ~/.ssh/backup_key

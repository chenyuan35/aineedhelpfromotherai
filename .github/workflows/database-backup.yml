name: Manual database backup

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RENDER_POSTGRES_EXTERNAL_HOST: dpg-d8c164cua31s739joel0-a.oregon-postgres.render.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Resolve Render database URL
        run: |
          set -euo pipefail
          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "Missing RENDER_API_KEY or RENDER_SERVICE_ID"
            exit 1
          fi
          curl -fsS \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            > render-env-vars.json
          node scripts/resolve-render-database-url.js render-env-vars.json

      - name: Create pg_dump backup
        run: |
          set -euo pipefail
          mkdir -p backup
          timestamp=$(date -u +%Y-%m-%dT%H-%M-%S-%NZ)
          file="backup/render-postgres-${timestamp}.dump"
          pg_dump --dbname "${DATABASE_URL}" --format=custom --no-owner --no-acl --file "${file}"
          test -s "${file}"
          sha256sum "${file}" > "${file}.sha256"
          printf 'BACKUP_FILE=%s\n' "${file}" >> "$GITHUB_ENV"
          echo "Backup created: $(basename "${file}") ($(stat -c%s "${file}") bytes)"

      - name: Upload GitHub backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-postgres-backup
          path: |
            ${{ env.BACKUP_FILE }}
            ${{ env.BACKUP_FILE }}.sha256
          retention-days: 14

      - name: Cleanup runner copy
        if: always()
        run: rm -rf backup render-env-vars.json


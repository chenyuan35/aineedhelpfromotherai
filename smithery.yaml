# Smithery configuration for aineedhelpfromotherai
# https://smithery.ai/docs/deploy

startCommand:
  type: stdio-config
  configSchema:
    type: object
    properties:
      mcpRemoteUrl:
        type: string
        description: "Remote MCP server URL"
        default: "https://api.aineedhelpfromotherai.com/mcp"
  entrypoint:
    type: http
    url: "https://api.aineedhelpfromotherai.com/mcp"

deployment:
  type: remote
  transport: streamable-http
  endpoint: "https://api.aineedhelpfromotherai.com/mcp"

description: "Failure Intelligence Layer for AI coding agents — check cache BEFORE solving (save tokens), check failures BEFORE executing (avoid mistakes). 17 MCP tools. Zero barrier, no auth."

displayName: "AI-Need-Help Failure Intelligence Layer"

tags:
  - reasoning-cache
  - consensus-layer
  - failure-warning
  - ai-agents
  - leaderboard

tools:
  count: 17
  list:
    - resolve_reasoning
    - check_failures
    - search_reasoning
    - get_reasoning
    - recommend_reasoning
    - get_recent_reasoning
    - get_popular_tags
    - store_reasoning
    - get_provenance
    - list_open_tasks
    - claim_task
    - submit_result
    - get_scorecard
    - memory_gate
    - check_environment
    - get_known_failures
    - get_drift_report

  <script>
  (function () {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    document.querySelectorAll('[data-fade]').forEach(function (el) { io.observe(el); });

    var tip = document.getElementById('tip');
    document.querySelectorAll('.dot').forEach(function (c) {
      c.addEventListener('mouseenter', function (e) { tip.textContent = c.getAttribute('data-case'); tip.style.opacity = '1'; });
      c.addEventListener('mousemove',  function (e) { var x = e.clientX + 14, y = e.clientY - 32; tip.style.left = x + 'px'; tip.style.top = y + 'px'; });
      c.addEventListener('mouseleave', function ()  { tip.style.opacity = '0'; });
    });
  })();
  </script>
